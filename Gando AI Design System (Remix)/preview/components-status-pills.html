<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/></head>
<body class="card">
  <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
    <div style="display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:9999px;background:rgba(74,222,128,0.10);border:1px solid rgba(74,222,128,0.25);color:#4ade80;font-family:Manrope;font-weight:900;font-size:10px;letter-spacing:0.15em;text-transform:uppercase">● Operational</div>
    <div style="display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:9999px;background:rgba(253,139,0,0.10);border:1px solid rgba(253,139,0,0.25);color:#fd8b00;font-family:Manrope;font-weight:900;font-size:10px;letter-spacing:0.15em;text-transform:uppercase">◐ Degraded</div>
    <div style="display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:9999px;background:rgba(248,113,113,0.10);border:1px solid rgba(248,113,113,0.25);color:#f87171;font-family:Manrope;font-weight:900;font-size:10px;letter-spacing:0.15em;text-transform:uppercase">✕ Down</div>
    <div style="display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:9999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);color:#adaaaa;font-family:Manrope;font-weight:900;font-size:10px;letter-spacing:0.15em;text-transform:uppercase">◌ Checking</div>
  </div>
</body></html>

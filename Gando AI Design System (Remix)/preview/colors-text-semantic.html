<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/></head>
<body class="card">
  <div class="pc-strip" style="grid-template-columns:repeat(6,1fr)">
    <div class="pc-swatch" style="background:#ffffff;color:#000"><span class="pc-name">fg-1</span><span class="pc-hex">#ffffff</span></div>
    <div class="pc-swatch" style="background:#adaaaa;color:#000"><span class="pc-name">fg-2</span><span class="pc-hex">#adaaaa</span></div>
    <div class="pc-swatch" style="background:#767575;color:#fff"><span class="pc-name">fg-3</span><span class="pc-hex">#767575</span></div>
    <div class="pc-swatch" style="background:#52525b;color:#fff"><span class="pc-name">fg-4</span><span class="pc-hex">#52525b</span></div>
    <div class="pc-swatch" style="background:#4ade80;color:#000"><span class="pc-name">ok</span><span class="pc-hex">#4ade80</span></div>
    <div class="pc-swatch" style="background:#f87171;color:#000"><span class="pc-name">down</span><span class="pc-hex">#f87171</span></div>
  </div>
</body></html>

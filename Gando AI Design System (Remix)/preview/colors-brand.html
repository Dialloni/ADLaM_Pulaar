<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/></head>
<body class="card">
  <div class="pc-row">
    <div class="pc-swatch" style="background:#ff8b9b">
      <span class="pc-name">Primary</span>
      <span class="pc-hex">#ff8b9b</span>
    </div>
    <div class="pc-swatch" style="background:#fd8b00">
      <span class="pc-name">Secondary</span>
      <span class="pc-hex">#fd8b00</span>
    </div>
    <div class="pc-swatch" style="background:#bca2ff">
      <span class="pc-name">Tertiary</span>
      <span class="pc-hex">#bca2ff</span>
    </div>
    <div class="pc-swatch" style="background:linear-gradient(135deg,#ff8b9b,#fd8b00)">
      <span class="pc-name">Brand Gradient</span>
      <span class="pc-hex">135°</span>
    </div>
  </div>
</body></html>

<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
  .row { display:flex; align-items:center; gap:18px; }
  .row + .row { margin-top:14px; }
  .sep { border-top:1px solid rgba(255,255,255,0.06); margin:18px 0; }
  .lbl { font-family:Manrope; font-weight:900; font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:#767575; width:88px; flex:0 0 88px; }
  .wm { font-family:Manrope; font-weight:900; letter-spacing:-0.04em; background:linear-gradient(135deg,#ff8b9b,#fd8b00); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; line-height:1; }
  .adlam { font-family:'Noto Sans Adlam',sans-serif; font-weight:700; background:linear-gradient(135deg,#ff8b9b,#fd8b00); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; line-height:1; }
</style>
</head>
<body class="card">
  <svg width="0" height="0" style="position:absolute"><defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff8b9b"/><stop offset="100%" stop-color="#fd8b00"/></linearGradient>
  </defs></svg>

  <div class="row">
    <div class="lbl">Lockup</div>
    <svg viewBox="0 0 64 64" width="44" height="44" fill="none">
      <rect x="2" y="2" width="60" height="60" rx="14" stroke="url(#g)" stroke-width="3"/>
      <path d="M20 20 Q20 44 32 44 Q44 44 44 32 Q44 22 34 22 L28 22" stroke="url(#g)" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <circle cx="34" cy="22" r="3" fill="#fd8b00"/>
    </svg>
    <span class="wm" style="font-size:40px;">Gando</span>
  </div>

  <div class="sep"></div>

  <div class="row">
    <div class="lbl">Latin</div>
    <span class="wm" style="font-size:56px;">Gando</span>
  </div>
  <div class="row">
    <div class="lbl">ADLaM</div>
    <span class="adlam" style="font-size:40px;">𞤘𞤢𞤲𞤣𞤮</span>
  </div>
</body></html>

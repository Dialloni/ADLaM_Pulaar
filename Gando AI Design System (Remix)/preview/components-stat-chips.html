<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/></head>
<body class="card">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
    <div style="background:#131313;border-left:4px solid #ff8b9b;padding:16px;border-radius:12px">
      <div style="font-family:Manrope;font-weight:900;font-size:10px;color:#ff8b9b;text-transform:uppercase;letter-spacing:0.2em;margin-bottom:8px">Projects</div>
      <div style="font-family:Manrope;font-weight:900;font-size:24px;color:#fff">24</div>
    </div>
    <div style="background:#131313;border-left:4px solid #fd8b00;padding:16px;border-radius:12px">
      <div style="font-family:Manrope;font-weight:900;font-size:10px;color:#fd8b00;text-transform:uppercase;letter-spacing:0.2em;margin-bottom:8px">Apps Built</div>
      <div style="font-family:Manrope;font-weight:900;font-size:24px;color:#fff">18</div>
    </div>
    <div style="background:#131313;border-left:4px solid #bca2ff;padding:16px;border-radius:12px">
      <div style="font-family:Manrope;font-weight:900;font-size:10px;color:#bca2ff;text-transform:uppercase;letter-spacing:0.2em;margin-bottom:8px">Tokens</div>
      <div style="font-family:Manrope;font-weight:900;font-size:24px;color:#fff">4.2K</div>
    </div>
  </div>
</body></html>
